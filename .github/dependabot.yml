# Keeps dependencies up to date via automated pull requests.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # Go modules (go.mod and go.sum).
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "gomod"
    # Bundle all Go updates into a single PR to keep the noise down.
    groups:
      go-modules:
        patterns:
          - "*"

  # GitHub Actions referenced in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    # Bundle all Action updates into a single PR.
    groups:
      github-actions:
        patterns:
          - "*"
