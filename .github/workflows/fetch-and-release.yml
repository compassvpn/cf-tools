name: Fetch And Release

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight (UTC)
  workflow_dispatch:

jobs:
  fetch-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # fail before GitHub's 6h hard cap so a slow run doesn't publish partial data
    permissions:
      contents: write
    env:
      CGO_ENABLED: 0

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24.5'
        check-latest: true

    - name: Download dependencies
      run: go mod download

    - name: Fetch, convert, and scan
      run: go run . -c -w # single fetch, produces all three lists

    - name: Verify output files are non-empty
      run: |
        test -s all_cf_v4.txt
        test -s all_cdn_v4.txt
        test -s all_warp_v4.txt

    - name: Set release variables
      run: |
        echo "RELEASE_TAG=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        echo "RELEASE_DATE=$(date -u +'%A %F %T %Z')" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: ${{ env.RELEASE_TAG }}
        tag_name: ${{ env.RELEASE_TAG }}
        draft: false
        prerelease: false
        fail_on_unmatched_files: true
        files: |
          all_cf_v4.txt
          all_cdn_v4.txt
          all_warp_v4.txt
        body: |
          Auto Updated at ${{ env.RELEASE_DATE }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Clean older releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 30
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
